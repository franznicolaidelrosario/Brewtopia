<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brewtopia Menu</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1><a href="index.html" class="logo">BREWTOPIA 𑣲☕˖</a></h1>
<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="menu.html">Menu</a></li>
<li><a href="order.html">Contact</a></li>
</ul>
</nav>
</header>

<main>

<h2 class="menu-title">Our Menu</h2>

<div class="menu-grid">

<div class="menu-item" onclick="addItem('Spanish Latte',120)">
<img src="spanish.jpeg" alt="Spanish Latte">
<h3>Spanish Latte</h3>
<p>₱120</p>
</div>

<div class="menu-item" onclick="addItem('Matcha Latte',150)">
<img src="matcha.jpeg" alt="Matcha Latte">
<h3>Matcha Latte</h3>
<p>₱150</p>
</div>

<div class="menu-item" onclick="addItem('Caramel Macchiato',150)">
<img src="macchiato.jpeg" alt="Macchiato">
<h3>Caramel Macchiato</h3>
<p>₱150</p>
</div>

<div class="menu-item" onclick="addItem('Croissant',90)">
<img src="croissant.jpeg" alt="Croissant">
<h3>Croissant</h3>
<p>₱90</p>
</div>

</div>

<section class="order-section">

<h2>Your Order</h2>

<div class="order-card">

<table id="orderTable">
<tr>
<th>Item</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Action</th>
</tr>
</table>

<h3>Total Price: ₱<span id="totalPrice">0</span></h3>

<button class="order-btn" onclick="placeOrder()">Place Order</button>

</div>

</section>

</main>

<footer>
<p>© 2026 Brewtopia Coffee Shop</p>
</footer>

<script>

let total = 0;

function addItem(name, price){

let table = document.getElementById("orderTable");
let rows = table.rows;
let found = false;

for(let i = 1; i < rows.length; i++){

let itemName = rows[i].cells[0].innerText;

if(itemName === name){

let qtyCell = rows[i].cells[2].querySelector(".qty");
let qty = parseInt(qtyCell.innerText);
qty++;

qtyCell.innerText = qty;

updateRowTotal(rows[i], price);

found = true;
break;

}

}

if(!found){

let row = table.insertRow();

row.innerHTML = `
<td>${name}</td>
<td>₱${price}</td>
<td>
<button onclick="changeQty(this, -1, ${price})">−</button>
<span class="qty">1</span>
<button onclick="changeQty(this, 1, ${price})">+</button>
</td>
<td class="rowTotal">₱${price}</td>
<td><button onclick="removeItem(this)">Remove</button></td>
`;

}

total += price;
updateTotal();

}

function changeQty(btn, change, price){

let row = btn.closest("tr");
let qtySpan = row.querySelector(".qty");

let qty = parseInt(qtySpan.innerText);
qty += change;

if(qty < 1) return;

qtySpan.innerText = qty;

updateRowTotal(row, price);
updateTotal();

}

function updateRowTotal(row, price){

let qty = parseInt(row.querySelector(".qty").innerText);
let totalCell = row.querySelector(".rowTotal");

totalCell.innerText = "₱" + (qty * price);

}

function removeItem(btn){

let row = btn.closest("tr");
row.remove();

updateTotal();

}

function updateTotal(){

let rows = document.querySelectorAll("#orderTable tr");
total = 0;

rows.forEach((row,i)=>{

if(i===0) return;

let totalCell = row.querySelector(".rowTotal");

if(totalCell){
total += parseInt(totalCell.innerText.replace("₱",""));
}

});

document.getElementById("totalPrice").innerText = total;

}

function placeOrder(){
alert("Thank you! Your order total is ₱" + total);
}

</script>

</body>
</html>
